[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --timeout=60
pythonpath =
    .
    tests
markers =
    unit: fast deterministic tests
    integration: multi-component tests
    durability: restart/persistence tests
    phase4: certification tests
    phase4_cert: certification-grade phase4 evidence (no mocked orchestrator.handle_turn)
    phase4_harness: harness-grade phase4 checks (mocking/stubs allowed; excluded from certification scoring)
    cert: full certification/regression lane tests
    replay: deterministic replay and restart-equivalence tests
    wiring: facade/delegation/contract wiring tests
    regression: baseline regression guard tests
    observability: traces/metrics/logging assertions
    soak: high-load / long-running tests
    ui: streamlit or UI tests
    postgres: tests that require a live Postgres DSN
    property_verification: independent runtime property verification suite
    slow: legacy long-running marker (prefer soak)
    stress: legacy high-load stress marker
