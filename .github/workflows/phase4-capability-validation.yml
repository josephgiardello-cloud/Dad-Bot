name: Phase4 Capability Validation

on:
  push:
  pull_request:

jobs:
  phase4-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,service]

      - name: Unit and Invariant Tests
        run: |
          python -m pytest -q tests/test_turn_graph_invariants.py tests/test_recovery_and_idempotency.py

      - name: Replay and Determinism Suite
        run: |
          python -m pytest -q tests/test_turn_graph_replay.py

      - name: Phase 4 Stress Suite
        run: |
          python -m pytest -q tests/stress/test_full_execution_trace.py

      - name: Capability Audit Runner (report-only gate)
        id: capability_audit
        continue-on-error: true
        run: |
          python run_capability_audit.py

      - name: Upload Capability Audit Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capability-audit-report
          path: session_logs/capability_audit_report.json
          if-no-files-found: warn

      - name: Capability Audit Summary
        if: always()
        run: |
          echo "### Capability Audit (Non-Authoritative)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: ${{ steps.capability_audit.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f session_logs/capability_audit_report.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
import json
from pathlib import Path

path = Path("session_logs/capability_audit_report.json")
data = json.loads(path.read_text(encoding="utf-8"))
print(f"- overall_ok: {data.get('overall_ok')}")
for scenario in data.get("scenarios", []):
    print(f"- scenario {scenario.get('scenario')}: ok={scenario.get('ok')}")
PY
          else
            echo "- capability_audit_report.json not found" >> "$GITHUB_STEP_SUMMARY"
          fi