name: Phase4 Capability Validation

on:
  push:
  pull_request:

jobs:
  layer1-kernel-correctness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,service]

      - name: Canonical Snapshot Truth Path Guard
        run: |
          python tools/generate_full_system_snapshot.py
          python tools/verify_latest_snapshot_canonical.py

      - name: Kernel Boundary Validator (Hard Fail)
        run: |
          python ci/kernel_boundary_check.py

      - name: Layer 1 - Core Import Firewall
        run: |
          python -m pytest -q tests/test_core_import_firewall.py

      - name: Layer 1 - Kernel Correctness (Strict)
        run: |
          python -m pytest -v --tb=short -p no:randomly --timeout=60 \
            tests/test_execution_truth_binding.py \
            tests/test_execution_trace_fingerprint.py \
            tests/test_kernel_freeze_phase1.py \
            tests/test_system_consistency.py \
            tests/test_config_drift.py \
            tests/test_phase45_egress_policy.py \
            tests/test_phase45_merkle_anchor.py \
            tests/test_phase45_config_approval.py \
            tests/test_phase45_rtbf_proof.py

      - name: Layer 1 - Memory and Routing Correctness
        run: |
          python -m pytest -v --tb=short -p no:randomly --timeout=60 \
            tests/test_phase3_world_integration.py \
            tests/test_durable_execution.py \
            tests/external_tool_runtime_test.py \
            tests/tool_system_v2_equivalence_test.py

  layer2-replay-correctness:
    needs: layer1-kernel-correctness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,service]

      - name: Layer 2 - Replay Determinism
        run: |
          python -m pytest -q -p no:randomly --tb=short --timeout=60 \
            tests/test_phase2_replay_equivalence.py \
            tests/test_turn_graph_replay.py

      - name: Layer 2 - DAG and Oracle Validation
        run: |
          python -m pytest -q -p no:randomly --tb=short --timeout=60 \
            tests/test_phase5_semantic_equivalence.py \
            tests/test_phase5_execution_semantics.py \
            tests/test_transaction_coordinator_phase5.py

  layer3-stress-adversarial:
    needs: layer2-replay-correctness
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,service]

      - name: Layer 3 - Adversarial Suite (Non-Blocking)
        run: |
          python -m pytest -q -p no:randomly --runxfail --tb=short --timeout=60 \
            tests/test_phase4a_adversarial_collapse.py

      - name: Layer 3 - Stress Suite (Non-Blocking)
        run: |
          python -m pytest -q -p no:randomly --tb=short --timeout=60 \
            tests/stress/test_full_execution_trace.py

      - name: Layer 3 - Summary
        if: always()
        run: |
          echo "### Layer 3: Stress/Adversarial (Non-Blocking)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Adversarial and stress suites are advisory only." >> "$GITHUB_STEP_SUMMARY"